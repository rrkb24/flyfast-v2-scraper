name: FlyFast V2 Scraper

on:
  schedule:
    - cron: '*/5 * * * *' # Run every 5 minutes
  workflow_dispatch: # Allows manual triggering from the GitHub UI

jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Code Version
        run: echo "Running commit $(git rev-parse HEAD)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Dependencies
        run: npm install

      - name: Ensure Puppeteer Chrome is Installed
        run: npx puppeteer browsers install chrome

      - name: Run ATL Adapter
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node adapters/ATL.js

      - name: Run LAX Adapter
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node adapters/LAX.js
