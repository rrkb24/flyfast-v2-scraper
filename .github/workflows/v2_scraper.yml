name: FlyFast V2 Scraper
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
jobs:
  scrape-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Verify Code Version
        run: echo "Running commit $(git rev-parse HEAD)"
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install Dependencies
        run: npm install
        env:
          PUPPETEER_SKIP_DOWNLOAD: 'true'
      - name: Run All Adapters
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome
        run: node scraper/run_all.js
      - name: Commit Updated Wait Times JSON
        run: |
          git config user.name "FlyFast Bot"
          git config user.email "bot@flyfast.app"
          git add public/wait_times_v2.json
          git diff --staged --quiet || git commit -m "Auto-update wait times [skip ci]"
          git pull --rebase origin main -X theirs || true
          git push
